<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Cisternas | Arq. David Lindoro</title>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #e0e0e0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--negro); color: var(--texto); display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--gris); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border-top: 4px solid var(--oro); }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; }
        .firma { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 25px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--oro); font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        button { width: 100%; padding: 15px; background: var(--oro); color: var(--negro); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        button:hover { background: #b48e45; }
        #resultado { margin-top: 25px; padding: 20px; background: #1a1a1a; border-radius: 10px; border-left: 5px solid var(--oro); display: none; }
        .price { font-size: 2.2rem; color: white; font-weight: bold; margin-bottom: 10px; }
        .details { font-size: 0.85rem; color: #bbb; line-height: 1.6; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Arq. David Lindoro</h1>
    <div class="firma">Neuroarquitectura & Alta Ingeniería | Puebla</div>

    <div class="field">
        <label>Capacidad (Litros)</label>
        <input type="number" id="litros" value="10000">
    </div>

    <div class="field">
        <label>Espesor de Muro (Tabique Rojo)</label>
        <select id="muro">
            <option value="12">12 cm (Soga - Económico)</option>
            <option value="28">28 cm (Tesón - Reforzado)</option>
        </select>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="tapaHerreria">
        <label>¿Requiere Tapa de Herrería en Brocal?</label>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="castillos" checked>
        <label>Incluir Castillos Intermedios (Propuesta)</label>
    </div>

    <button onclick="generarPresupuesto()">Calcular Cotización Técnica</button>

    <div id="resultado">
        <div style="font-size: 0.8rem; color: var(--oro);">Inversión Total Estimada:</div>
        <div id="monto" class="price"></div>
        <div id="detalleTxt" class="details"></div>
    </div>
</div>

<script>
function generarPresupuesto() {
    const litros = parseFloat(document.getElementById('litros').value);
    const espesorMuro = document.getElementById('muro').value;
    const conHerreria = document.getElementById('tapaHerreria').checked;
    const conCastillos = document.getElementById('castillos').checked;

    if (!litros || litros < 1000) return alert("Ingrese capacidad válida.");

    // --- PARÁMETROS TÉCNICOS (Sincronizados con tu lista de materiales) ---
    const costoMuroBase = (espesorMuro == "12") ? 3200 : 5600; // Por cada 1000L
    const costoLosaVigueta = 1450; // Vigueta 1/2", Bovedilla 60cm, Malla 10-10
    const costoHerreria = conHerreria ? 2850 : 650; // Tapa placa/ángulo vs Tapa concreto sencilla
    
    const lado = Math.pow(litros/1000, 1/3);
    const areaLosa = (lado * lado) * 1.15;
    
    // Insumos de tu lista: 1.5 Mill Tabique, 1 Ton Cemento, Plomería, Bomba
    const costosFijosMateriales = 32000; 
    const manoObraYExcavacion = 22500;
    const ingenieriaRefuerzos = (conCastillos ? 4200 : 0) + (lado * 210); // Castillos + Nervio temperatura

    // --- CÁLCULO FINAL ---
    let subtotalMuros = (litros / 1000) * costoMuroBase;
    let subtotalLosa = areaLosa * costoLosaM2Calculo(areaLosa);
    
    function costoLosaM2Calculo(area) { return 1450; }

    const total = (subtotalMuros + (areaLosa * 1450) + costoHerreria + ingenieriaRefuerzos + costosFijosMateriales + manoObraYExcavacion) * (litros/10000);

    const formato = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);

    document.getElementById('monto').innerText = formato(total);
    
    document.getElementById('detalleTxt').innerHTML = `
        <strong>Especificaciones de Obra:</strong><br>
        • Muros: Tabique rojo de ${espesorMuro} cm.<br>
        • Losa: Vigueta reforzada 1/2" y bovedilla de 60 cm.<br>
        • Nervio: Transversal (2 varillas 3/8") con grapas #2.<br>
        • Acceso: ${conHerreria ? 'Tapa de herrería (Placa/Ángulo)' : 'Tapa de concreto reforzada'}.<br>
        • Estructura: ${conCastillos ? '4 Castillos intermedios incluidos' : 'Sin castillos intermedios'}.<br><br>
        <strong>Suministros:</strong> 1.5 Millares Tabique | 1 Ton Cemento | 10m Vigueta.
    `;
    
    document.getElementById('resultado').style.display = 'block';
}
</script>

</body>
</html>
