<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Arq. David Lindoro</title>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #f0f0f0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--negro); color: var(--texto); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--gris); padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 500px; border-top: 5px solid var(--oro); }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .firma { text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--oro); font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: #1a1a1a; padding: 14px; border-radius: 8px; border: 1px solid #333; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 15px; }
        .btn-calc { background: var(--oro); color: var(--negro); }
        .btn-print { background: #444; color: white; margin-top: 10px; display: none; }
        #resultado { margin-top: 25px; padding: 20px; background: #000; border-radius: 10px; border-left: 6px solid var(--oro); display: none; }
        .price { font-size: 2.4rem; color: #fff; font-weight: bold; margin-bottom: 8px; }
        .details { font-size: 0.88rem; color: #ccc; line-height: 1.7; border-top: 1px solid #333; padding-top: 12px; margin-top: 12px; }
        
        @media print {
            body { background: white; color: black; }
            .card { box-shadow: none; border: none; width: 100%; max-width: none; background: white; }
            .field, .checkbox-group, .btn-calc, .btn-print, h1, .firma { display: none; }
            #resultado { display: block !important; background: white; color: black; border: none; padding: 0; }
            .price, .details { color: black; }
            .print-header { display: block !important; border-bottom: 2px solid #c5a059; margin-bottom: 20px; }
        }
        .print-header { display: none; color: black; }
    </style>
</head>
<body>

<div class="card">
    <div class="print-header">
        <h1 style="color: #c5a059; text-align: left;">ARQ. DAVID LINDORO</h1>
        <p>Cotizaciones Residenciales | Puebla, México</p>
    </div>

    <h1>Arq. David Lindoro</h1>
    <div class="firma">Cotizaciones Residenciales</div>

    <div class="field"><label>Capacidad (Litros)</label><input type="number" id="litros" value="10000"></div>
    <div class="field">
        <label>Material de Muros</label>
        <select id="tipoMaterial">
            <option value="Tabique">Tabique Rojo Común (Puebla)</option>
            <option value="Block">Block Macizo (12x20x40 cm)</option>
        </select>
    </div>
    <div class="field">
        <label>Espesor Estructural</label>
        <select id="espesor">
            <option value="12">12 cm (Soga)</option>
            <option value="28">28 cm (Tesón)</option>
        </select>
    </div>
    <div class="checkbox-group"><input type="checkbox" id="castillos" checked><label>Incluir Castillos Intermedios</label></div>
    <div class="checkbox-group"><input type="checkbox" id="tapaHerreria"><label>¿Añadir Tapa de Herrería en Brocal?</label></div>

    <button class="btn-calc" onclick="generarPresupuesto()">Calcular Presupuesto</button>
    <button id="btnPrint" class="btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>

    <div id="resultado">
        <div style="font-size: 0.8rem; color: var(--oro); text-transform: uppercase;">Inversión Estimada:</div>
        <div id="monto" class="price"></div>
        <div id="detalleTxt" class="details"></div>
    </div>
</div>

<script>
    function generarPresupuesto() {
        var litros = parseFloat(document.getElementById('litros').value);
        var material = document.getElementById('tipoMaterial').value;
        var espesor = document.getElementById('espesor').value;
        var conHerreria = document.getElementById('tapaHerreria').checked;
        var conCastillos = document.getElementById('castillos').checked;

        if (!litros || litros < 10) {
            alert("Ingrese una capacidad válida.");
            return;
        }

        var lado = Math.pow(litros/1000, 1/3);
        var areaLosa = (lado * lado) * 1.18;
        var f = litros / 10000;

        var costoM = (material === "Tabique") ? (espesor === "12" ? 3600 : 6250) : (espesor === "12" ? 3950 : 6700);
        var total = ((litros/1000 * costoM) + (areaLosa * 1720) + (lado * 245) + (conCastillos ? 4600 : 0) + (conHerreria ? 3600 : 0) + 54000) * (f * 0.61);

        var fmt = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(total);
        document.getElementById('monto').innerText = fmt;
        
        var acceso = conHerreria ? "Herrería (Placa/Ángulo)." : "Sin Tapa.";
        
        document.getElementById('detalleTxt').innerHTML = 
            "<strong>Capacidad Cotizada:</strong> " + litros.toLocaleString() + " Litros<br>" +
            "<strong>Dimensiones Sugeridas:</strong> " + lado.toFixed(2) + "m x " + lado.toFixed(2) + "m x 1.60m<br><br>" +
            "<strong>Ficha de Obra - Arq. David Lindoro:</strong><br>" +
            "• Preparación: Excavación mecánica y afine de fondo manual.<br>" +
            "• Estructura: Geometría definida por muros de " + material + " (" + espesor + " cm) y cimbra.<br>" +
            "• Losa: Vigueta Alma Abierta (1/2\") y Malla 6x6-6/6.<br>" +
            "• Nervio: Transversal obligatorio (2 varillas 3/8\" y grapas #2).<br>" +
            "• Concreto: f'c=200 kg/cm² hecho en obra.<br>" +
            "• Acceso: " + acceso;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'block';
    }
</script>
</body>
</html>
