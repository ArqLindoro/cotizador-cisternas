<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Arq. David Lindoro</title>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #f0f0f0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--negro); color: var(--texto); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--gris); padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 600px; border-top: 5px solid var(--oro); }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .firma { text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--oro); font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: #1a1a1a; padding: 14px; border-radius: 8px; border: 1px solid #333; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 15px; background: var(--oro); color: var(--negro); }
        #resultado { margin-top: 25px; display: none; }
        .price-box { background: #000; padding: 20px; border-radius: 10px; border-left: 6px solid var(--oro); margin-bottom: 20px; }
        .price { font-size: 2.4rem; color: #fff; font-weight: bold; }
        .details { font-size: 0.9rem; color: #ccc; line-height: 1.7; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; font-size: 0.85rem; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { color: var(--oro); background: #111; text-transform: uppercase; font-size: 0.75rem; }
        
        @media print {
            .field, .checkbox-group, button, h1, .firma { display: none; }
            body { background: white; color: black; }
            .card { box-shadow: none; border: none; background: white; width: 100%; max-width: none; }
            #resultado { display: block !important; }
            .price-box, table, th, td { color: black; border: 1px solid #000; background: white; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Arq. David Lindoro</h1>
    <div class="firma">Cotizaciones Residenciales</div>

    <div class="field"><label>Capacidad (Litros)</label><input type="number" id="litros" value="10000"></div>
    <div class="field">
        <label>Material de Muros</label>
        <select id="tipoMaterial">
            <option value="Tabique">Tabique Rojo Común (Puebla)</option>
            <option value="Block">Block Macizo (12x20x40 cm)</option>
        </select>
    </div>
    <div class="field">
        <label>Espesor Estructural</label>
        <select id="espesor">
            <option value="12">12 cm (Soga)</option>
            <option value="28">28 cm (Tesón)</option>
        </select>
    </div>
    <div class="checkbox-group"><input type="checkbox" id="castillos" checked><label>Incluir Castillos Intermedios</label></div>
    <div class="checkbox-group"><input type="checkbox" id="tapaHerreria"><label>¿Añadir Tapa de Herrería en Brocal?</label></div>

    <button onclick="generarPresupuesto()">Calcular Presupuesto e Insumos</button>
    <button id="btnPrint" style="display:none; background:#444; color:white; margin-top:10px;" onclick="window.print()">Imprimir Reporte</button>

    <div id="resultado">
        <div class="price-box">
            <div style="font-size: 0.8rem; color: var(--oro); text-transform: uppercase;">Inversión Total Estimada:</div>
            <div id="monto" class="price"></div>
        </div>

        <div id="detalleTxt" class="details"></div>

        <h3 style="color:var(--oro); font-size:1rem; border-bottom:1px solid #444; padding-bottom:5px;">EXPLOSIÓN DE INSUMOS (PROPORCIONAL)</h3>
        <table>
            <thead>
                <tr>
                    <th>Insumo</th>
                    <th>Unidad</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="tablaInsumos"></tbody>
        </table>
    </div>
</div>

<script>
    function generarPresupuesto() {
        var litros = parseFloat(document.getElementById('litros').value);
        var material = document.getElementById('tipoMaterial').value;
        var espesor = document.getElementById('espesor').value;
        var conHerreria = document.getElementById('tapaHerreria').checked;
        var conCastillos = document.getElementById('castillos').checked;

        if (!litros || litros < 500) { alert("Capacidad fuera de rango"); return; }

        // --- LÓGICA DE ESCALAMIENTO ARQ. LINDORO ---
        var factorEscala = litros / 10000; 
        var lado = Math.pow(litros/1000, 1/3);
        var fmt = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' });

        // Costos Estructurales
        var costoM = (material === "Tabique") ? (espesor === "12" ? 3600 : 6250) : (espesor === "12" ? 3950 : 6700);
        var totalFinal = ((litros/1000 * costoM) + ((lado*lado*1.18) * 1720) + (lado * 245) + (conCastillos ? 4600 : 0) + (conHerreria ? 3600 : 0) + 42000)
