<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Arq. David Lindoro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #f0f0f0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--negro); color: var(--texto); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--gris); padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 500px; border-top: 5px solid var(--oro); }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .firma { text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--oro); font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: #1a1a1a; padding: 14px; border-radius: 8px; border: 1px solid #333; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 15px; }
        .btn-calc { background: var(--oro); color: var(--negro); }
        .btn-pdf { background: #444; color: white; margin-top: 10px; display: none; }
        .btn-insumos { background: #2e4a31; color: white; margin-top: 10px; display: none; }
        button:hover { opacity: 0.9; }
        #resultado { margin-top: 25px; padding: 20px; background: #000; border-radius: 10px; border-left: 6px solid var(--oro); display: none; }
        .price { font-size: 2.4rem; color: #fff; font-weight: bold; margin-bottom: 8px; }
        .details { font-size: 0.88rem; color: #ccc; line-height: 1.7; border-top: 1px solid #333; padding-top: 12px; margin-top: 12px; }
        
        /* Estilos PDF (Insumos) */
        #insumos-pdf, #tpu-pdf { display: none; color: black; background: white; padding: 40px; font-family: Arial, sans-serif; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h1>Arq. David Lindoro</h1>
    <div class="firma">Cotizaciones Residenciales</div>

    <div class="field"><label>Capacidad (Litros)</label><input type="number" id="litros" value="10000"></div>
    <div class="field">
        <label>Material de Muros</label>
        <select id="tipoMaterial">
            <option value="Tabique">Tabique Rojo Común (Puebla)</option>
            <option value="Block">Block Macizo (12x20x40 cm)</option>
        </select>
    </div>
    <div class="field">
        <label>Espesor Estructural</label>
        <select id="espesor">
            <option value="12">12 cm (Soga)</option>
            <option value="28">28 cm (Tesón)</option>
        </select>
    </div>
    <div class="checkbox-group"><input type="checkbox" id="castillos" checked><label>Incluir Castillos Intermedios</label></div>
    <div class="checkbox-group"><input type="checkbox" id="tapaHerreria"><label>¿Añadir Tapa de Herrería en Brocal?</label></div>

    <button class="btn-calc" onclick="generarPresupuesto()">Calcular Presupuesto</button>
    <button id="btnPdf" class="btn-pdf" onclick="descargarPDF()">Descargar Cotización PDF</button>
    <button id="btnInsumos" class="btn-insumos" onclick="descargarInsumos()">Descargar Insumos (Cantidades/Precios)</button>

    <div id="resultado">
        <div style="font-size: 0.8rem; color: var(--oro); text-transform: uppercase;">Inversión Estimada:</div>
        <div id="monto" class="price"></div>
        <div id="detalleTxt" class="details"></div>
    </div>
</div>

<div id="tpu-pdf">
    <h1 style="color: #c5a059;">ARQ. DAVID LINDORO</h1>
    <p>Cotizaciones Residenciales | Puebla, México</p>
    <div id="pdf-header-info"></div>
    <div id="pdf-cuerpo"></div>
</div>

<div id="insumos-pdf">
    <h1 style="color: #c5a059;">ARQ. DAVID LINDORO</h1>
    <p>Explosión de Insumos | Cantidades y Precios</p>
    <div id="pdf-header-insumos"></div>
    <table class="pdf-table">
        <thead><tr><th>Insumo</th><th>Unidad</th><th>Cant.</th><th>P.U.</th><th>Subtotal</th></tr></thead>
        <tbody id="p-insumos-body"></tbody>
    </table>
</div>

<script>
    var datosGlobales = {};

    function generarPresupuesto() {
        var litros = parseFloat(document.getElementById('litros').value);
        var material = document.getElementById('tipoMaterial').value;
        var espesor = document.getElementById('espesor').value;
        var conHerreria = document.getElementById('tapaHerreria').checked;
        var conCastillos = document.getElementById('castillos').checked;

        if (!litros || litros < 1000) { alert("Ingrese capacidad válida"); return; }

        var lado = Math.pow(litros/1000, 1/3);
        var areaLosa = (lado * lado) * 1.18;
        var factor = litros / 10000;

        var costoMuroBase = (material === "Tabique") ? (espesor === "12" ? 3600 : 6250) : (espesor === "12" ? 3950 : 6700);
        var total = ((litros/1000 * costoMuroBase) + (areaLosa * 1720) + (lado * 245) + (conCastillos ? 4600 : 0) + (conHerreria ? 3600 : 0) + 54000) * (factor * 0.61);

        var formato = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(total);
        document.getElementById('monto').innerText = formato;
        
        var accesoFinal = conHerreria ? "Herrería (Placa/Ángulo)." : "Sin Tapa.";
        var fichaTxt = "<strong>Ficha de Obra - Arq. David Lindoro:</strong><br>" +
            "• Preparación: Excavación mecánica y afine de fondo manual.<br>" +
            "• Estructura: Geometría definida por muros de " + material + " (" + espesor + " cm) y cimbra.<br>" +
            "• Losa: Vigueta Alma Abierta (1/2\") y Malla 6x6-6/6.<br>" +
            "• Nervio: Transversal obligatorio (2 varillas 3/8\" y grapas #2).<br>" +
            "• Concreto: f'c=200 kg/cm² hecho en obra.<br>" +
            "• Acceso: " + accesoFinal;

        document.getElementById('detalleTxt').innerHTML = fichaTxt;
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('btnPdf').style.display = 'block';
        document.getElementById('btnInsumos').style.display = 'block';

        datosGlobales = { total: formato, ficha: fichaTxt, litros: litros, material: material, espesor: espesor, lado: lado, factor: factor };
    }

    function descargarPDF() {
        document.getElementById('pdf-header-info').innerHTML = "<strong>Capacidad:</strong> " + datosGlobales.litros.toLocaleString() + " L | <strong>Medidas:</strong> " + datosGlobales.lado.toFixed(2) + "m x " + datosGlobales.lado.toFixed(2) + "m x 1.60m | <strong>Inversión:</strong> " + datosGlobales.total;
        document.getElementById('pdf-cuerpo').innerHTML = datosGlobales.ficha;
        var el = document.getElementById('tpu-pdf'); el.style.display = 'block';
        html2pdf().from(el).set({ margin: 0.5, filename: 'Cotizacion_Lindoro.pdf' }).save().then(() => { el.style.display = 'none'; });
    }

    function descargarInsumos() {
        var f = datosGlobales.factor;
        var fmt = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' });
        var insumos = [
            { d: datosGlobales.material + " " + datosGlobales.espesor + "cm", u: "Mill", c: 1.5 * f, p: 3800 },
            { d: "Cemento Gris CPC 30R", u: "Ton", c: 1.2 * f, p: 4050 },
            { d: "Arena de Mina", u: "Viaje", c: 0.5 * f, p: 1800 },
            { d: "Vigueta Ref. 1/2\"", u: "ml", c: 10 * f, p: 185 },
            { d: "Bovedilla 60cm", u: "Pza", c: 45 * f, p: 18 },
            { d: "Malla 6x6-6/6", u: "m2", c: 10 * f, p: 98 },
            { d: "Varilla 3/8\" (Refuerzo)", u: "Pza", c: 4 * f, p: 195 }
        ];
        var html = ""; insumos.forEach(i => { html += "<tr><td>"+i.d+"</td><td>"+i.u+"</td><td>"+i.c.toFixed(2)+"</td><td>"+fmt.format(i.p)+"</td><td>"+fmt.format(i.c*i.p)+"</td></tr>"; });
        document.getElementById('p-insumos-body').innerHTML = html;
        document.getElementById('pdf-header-insumos').innerHTML = "<strong>Proyecto:</strong> Cisterna " + datosGlobales.litros.toLocaleString() + " L";
        var el = document.getElementById('insumos-pdf'); el.style.display = 'block';
        html2pdf().from(el).set({ margin: 0.5, filename: 'Insumos_Lindoro.pdf' }).save().then(() => { el.style.display = 'none'; });
    }
</script>
</body>
</html>
