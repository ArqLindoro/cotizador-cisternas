<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotizador de Cisternas | Arq. David Lindoro</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 50px; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 15px; border-top: 5px solid #c5a059; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #c5a059; font-size: 1.5rem; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 15px; background: #c5a059; color: black; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #resultado { margin-top: 20px; padding: 15px; background: #333; border-radius: 10px; display: none; border-left: 4px solid #c5a059; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cotizador Arq. David Lindoro</h1>
        <label>Capacidad (Litros):</label>
        <input type="number" id="litros" placeholder="Ej: 10000">
        
        <label>Material:</label>
        <select id="material">
            <option value="5.50">Block Macizo</option>
            <option value="4.80">Ladrillo Rojo</option>
            <option value="8.50">Concreto Armado (Lujo)</option>
        </select>

        <button onclick="calcular()">CALCULAR PRESUPUESTO</button>

        <div id="resultado">
            <div id="textoTotal" style="font-size: 1.2rem; font-weight: bold;"></div>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">*Incluye excavación, sellado e impermeabilización técnica.</p>
        </div>
    </div>

    <script>
        function calcular() {
            const litros = document.getElementById('litros').value;
            const costoMaterial = document.getElementById('material').value;
            if(!litros) return alert("Ingresa los litros");

            const total = (litros * costoMaterial) + 6500;
            const formato = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(total);
            
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('textoTotal').innerText = "Inversión: " + formato;
        }
    </script>
</body>
</html>
