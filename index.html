<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Cisternas | Arq. David Lindoro</title>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #f0f0f0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--negro); 
            color: var(--texto); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }
        .card { 
            background: var(--gris); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 500px; 
            border-top: 5px solid var(--oro); 
        }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .firma { text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--oro); font-weight: 600; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #1a1a1a; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem; 
        }
        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 12px; 
            background: #1a1a1a; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #333; 
        }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--oro); 
            color: var(--negro); 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            margin-top: 15px; 
        }
        button:hover { background: #d4b375; }
        #resultado { 
            margin-top: 25px; 
            padding: 20px; 
            background: #000; 
            border-radius: 10px; 
            border-left: 6px solid var(--oro); 
            display: none; 
        }
        .price { font-size: 2.4rem; color: #fff; font-weight: bold; margin-bottom: 8px; }
        .details { font-size: 0.88rem; color: #ccc; line-height: 1.7; border-top: 1px solid #333; padding-top: 12px; margin-top: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Arq. David Lindoro</h1>
    <div class="firma">Ingeniería Hidráulica Residencial</div>

    <div class="field">
        <label>Capacidad (Litros)</label>
        <input type="number" id="litros" value="10000">
    </div>

    <div class="field">
        <label>Material de Muros</label>
        <select id="tipoMaterial">
            <option value="tabique">Tabique Rojo Común (Puebla)</option>
            <option value="block">Block Macizo (12x20x40 cm)</option>
        </select>
    </div>

    <div class="field">
        <label>Espesor Estructural</label>
        <select id="espesor">
            <option value="12">Muro de 12 cm (Soga)</option>
            <option value="28">Muro de 28 cm (Tesón)</option>
        </select>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="castillos" checked>
        <label>Incluir Castillos Intermedios</label>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="tapaHerreria">
        <label>¿Añadir Tapa de Herrería en Brocal?</label>
    </div>

    <button onclick="generarPresupuesto()">Calcular Presupuesto</button>

    <div id="resultado">
        <div style="font-size: 0.8rem; color: var(--oro); text-transform: uppercase;">Inversión Estimada:</div>
        <div id="monto" class="price"></div>
        <div id="detalleTxt" class="details"></div>
    </div>
</div>

<script>
    function generarPresupuesto() {
        const litros = parseFloat(document.getElementById('litros').value);
        const material = document.getElementById('tipoMaterial').value;
        const espesor = document.getElementById('espesor').value;
        const conHerreria = document.getElementById('tapaHerreria').checked;
        const conCastillos = document.getElementById('castillos').checked;

        if (!litros || litros < 1000) {
            alert("Por favor, ingrese una capacidad válida.");
            return;
        }

        // --- LÓGICA TÉCNICA PUEBLA 2026 ---
        const lado = Math.pow(litros/1000, 1/3);
        const areaLosa = (lado * lado) * 1.18;
        
        // Muros (Tabique 1.5 Millares base para 10k L)
        const costoMuro = {
            "tabique": (espesor == "12") ? 3600 : 6250,
            "block": (espesor == "12") ? 3950 : 6700
        };

        // Estructura obligatoria: Nervio temperatura 2 varillas 3/8" y grapas #2
        const costoNervio = lado * 245; 
        const costoLosaM2 = 1720; // Vigueta, bovedilla, malla 6x6-6/6, concreto fc=200

        // Insumos fijos (Basados en tu lista de materiales y plomería)
        const materialesFijos = 32500; 
        const manoObraLogistica = 25500;
        
        const costoCastillos = conCastillos ? (4 * 1150) : 0;
        const costoAcceso = conHerreria ? 3600 : 900;

        // --- RESULTADO FINAL ---
        const factorEscala = litros / 10000;
        const subtotalMuros = (litros / 1000) * costoMuro[material];
        const subtotalLosaTotal = (areaLosa * costoLosaM2) + costoNervio;
        
        const total = (subtotalMuros + subtotalLosaTotal + costoCastillos + costoAcceso + materialesFijos + manoObraLogistica) * (factorEscala * 0.61);

        const formato = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);

        document.getElementById('monto').innerText = formato(total);
        
        document.getElementById('detalleTxt').innerHTML = `
            <strong>Ficha Técnica Arq. David Lindoro:</strong><br>
            • Losa: Vigueta Alma Abierta (Ref. 1/2") y Bovedilla de 60cm.<br>
            • Refuerzo Losa: Malla 6x6-6/6 y <strong>Nervio de temperatura obligatorio</strong> (2 varillas 3/8" y grapas #2).<br>
            • Concreto: f'c=200 kg/cm² hecho en obra.<br>
            • Muros: ${material == 'tabique' ? 'Tabique Rojo' : 'Block Macizo'} (${espesor} cm).<br>
            • Acceso: ${conHerreria ? 'Tapa de herrería (Placa/Ángulo)' : 'Tapa de concreto'}.<br>
            • Estructura: ${conCastillos ? 'Castillos intermedios reforzados incluidos' : 'Sin castillos intermedios'}.
        `;
        
        document.getElementById('resultado').style.display = 'block';
    }
</script>

</body>
</html>
