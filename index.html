<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Cisternas | Arq. David Lindoro</title>
    <style>
        :root { --oro: #c5a059; --negro: #121212; --gris: #2a2a2a; --texto: #e0e0e0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--negro); color: var(--texto); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--gris); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border-top: 4px solid var(--oro); }
        h1 { color: var(--oro); text-align: center; font-weight: 300; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .firma { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 25px; font-style: italic; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--oro); font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        button { width: 100%; padding: 18px; background: var(--oro); color: var(--negro); border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 15px; }
        button:hover { background: #b48e45; transform: translateY(-2px); }
        #resultado { margin-top: 25px; padding: 20px; background: #111; border-radius: 10px; border-left: 5px solid var(--oro); display: none; animation: fadeIn 0.4s; }
        .price { font-size: 2.3rem; color: white; font-weight: bold; margin-bottom: 5px; }
        .details { font-size: 0.85rem; color: #bbb; line-height: 1.6; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Arq. David Lindoro</h1>
    <div class="firma">Ingeniería Hidráulica Residencial | Puebla</div>

    <div class="field">
        <label>Capacidad (Litros)</label>
        <input type="number" id="litros" value="10000" min="1000">
    </div>

    <div class="field">
        <label>Material de Muros</label>
        <select id="tipoMaterial">
            <option value="tabique">Tabique Rojo Común (Puebla)</option>
            <option value="block">Block Macizo (12x20x40 cm)</option>
        </select>
    </div>

    <div class="field">
        <label>Espesor de Muro</label>
        <select id="espesor">
            <option value="12">12 cm (Soga / Económico)</option>
            <option value="28">28 cm (Tesón / Reforzado)</option>
        </select>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="tapaHerreria">
        <label>Incluir Tapa de Herrería en Brocal</label>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="castillos" checked>
        <label>Castillos Intermedios y Nervio Temperatura</label>
    </div>

    <button onclick="generarCotizacion()">Calcular Inversión de Obra</button>

    <div id="resultado">
        <div style="font-size: 0.8rem; color: var(--oro); text-transform: uppercase;">Presupuesto Estimado:</div>
        <div id="monto" class="price"></div>
        <div id="detalleTxt" class="details"></div>
    </div>
</div>

<script>
function generarCotizacion() {
    const litros = parseFloat(document.getElementById('litros').value);
    const material = document.getElementById('tipoMaterial').value;
    const espesor = document.getElementById('espesor').value;
    const conHerreria = document.getElementById('tapaHerreria').checked;
    const conCastillos = document.getElementById('castillos').checked;

    if (!litros || litros < 1000) return alert("Ingrese capacidad válida.");

    // --- PARÁMETROS TÉCNICOS ---
    const lado = Math.pow(litros/1000, 1/3);
    const areaLosa = (lado * lado) * 1.15;
    
    // Costos según especificación: Vigueta 1/2", Bovedilla, Malla 6x6-6/6, Concreto f'c=200
    const costoLosaM2 = 1680; 
    const costoMuro = {
        "tabique": (espesor == "12") ? 3550 : 6100,
        "block": (espesor == "12") ? 3900 : 6600
    };

    // Insumos basados en tu lista de materiales y plomería
    const materialesBase = 31000; 
    const plomeriaBomba = 9200;
    const manoObraExcavacion = 24500;
    
    const costoHerreria = conHerreria ? 3400 : 950;
    const refuerzosEstruct = (conCastillos ? 5200 : 0) + (lado * 260);

    // --- CÁLCULO FINAL ---
    const factorCapacidad = litros / 10000;
    const subtotalEstructura = (litros / 1000) * costoMuro[material];
    
    const total = (subtotalEstructura + (areaLosa * costoLosaM2) + costoHerreria + refuerzosEstruct + materialesBase + plomeriaBomba + manoObraExcavacion) * (factorCapacidad * 0.62);

    const formato = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);

    document.getElementById('monto').innerText = formato(total);
    
    document.getElementById('detalleTxt').innerHTML = `
        <strong>Ficha de Alta Ingeniería:</strong><br>
        • Losa: Vigueta reforzada 1/2" y Bovedilla de 60cm.<br>
        • Refuerzo: Malla 6x6-6/6 y Nervio central (2 varillas 3/8").<br>
        • Concreto: f'c=200 kg/cm² hecho en obra con vibrado manual.<br>
        • Muros: ${material == 'tabique' ? 'Tabique Rojo' : 'Block Macizo'} de ${espesor} cm.<br>
        • Acceso: ${conHerreria ? 'Tapa de herrería reforzada' : 'Tapa de concreto con argollas'}.<br><br>
        <strong>Suministros:</strong> 1.5 Millares Tabique | 1 Ton Cemento | Plomería Tuboplus.
    `;
    
    document.getElementById('resultado').style.display = 'block';
}
</script>

</body>
</html>
